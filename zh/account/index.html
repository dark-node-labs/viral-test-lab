<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>登录 | Quick Test Hub</title><link rel="stylesheet" href="/assets/styles.css?v=25"><link rel="icon" href="/assets/og-card.png" type="image/png"></head>
  <body class="account-page">
    <header class="site-header"><nav class="nav account-nav" aria-label="主导航"><a class="logo" href="/zh/"><span class="logo-mark">Q</span><span>Quick Test Hub</span></a><div class="account-nav-actions"><details class="language-menu"><summary>语言</summary><div class="language-popover"><a data-lang="en" href="/account/">English</a><a data-lang="zh" href="/zh/account/">中文</a><a data-lang="fr" href="/fr/account/">Français</a><a data-lang="vi" href="/vi/account/">Tiếng Việt</a></div></details></div></nav></header>
    <main><section class="account-shell"><div class="account-card auth-card" data-auth-page>
      <p class="eyebrow">你的账户</p><div class="account-status"><span class="account-status-dot" aria-hidden="true"></span><span data-auth-status>邮箱和 Google 登录</span></div><h1>把测试空间集中在一起。</h1><p class="account-intro">登录后，你可以在 Quick Test Hub 中保持统一的起点。测试本身仍然直接在浏览器中运行。</p>
      <div class="auth-panel" data-auth-panel><div class="auth-mode-toggle" role="tablist" aria-label="账户操作"><button type="button" class="is-active" data-auth-mode="signin" role="tab" aria-selected="true">登录</button><button type="button" data-auth-mode="signup" role="tab" aria-selected="false">注册账户</button></div><form class="auth-form" data-auth-form><label for="auth-email">邮箱</label><input id="auth-email" name="email" type="email" autocomplete="email" required placeholder="you@example.com"><label for="auth-password">密码</label><input id="auth-password" name="password" type="password" autocomplete="current-password" minlength="6" required placeholder="至少 6 个字符"><button class="button primary auth-submit" type="submit" data-auth-submit>使用邮箱登录 <span aria-hidden="true">→</span></button></form><div class="auth-divider"><span>或</span></div><button class="button google-button" type="button" data-auth-google><span class="google-mark" aria-hidden="true">G</span>使用 Google 继续</button><p class="auth-message" data-auth-message role="status" aria-live="polite"></p><p class="auth-legal">继续操作即表示你同意将本站用于合法的测试与 QA 工作。</p></div>
      <div class="account-signed-in" data-auth-signed-in hidden><div class="account-identity"><span>当前账户</span><strong data-auth-user></strong></div><div class="account-actions"><a class="button primary" href="/zh/reaction-time-test/">打开测试 <span aria-hidden="true">→</span></a><button class="button secondary" type="button" data-auth-signout>退出登录</button></div></div><div class="account-actions auth-back"><a class="button secondary" href="/zh/">返回测试</a></div>
    </div></section></main><script src="/assets/auth.js?v=1"></script><script src="/assets/i18n.js?v=22"></script>
  </body>
</html>
